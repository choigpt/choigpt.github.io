# Site configuration for Chirpy.

theme: jekyll-theme-chirpy

lang: ko-KR
timezone: Asia/Seoul

title: choigpt
tagline: Backend engineering notes
description: >-
  Backend, Spring, distributed systems, performance tuning, and AI study notes.

url: "https://choigpt.github.io"
baseurl: ""

github:
  username: choigpt

social:
  name: choigpt
  email:
  links:
    - https://github.com/choigpt

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

theme_mode:
cdn:
avatar:
social_preview_image:
toc: true

actions:
  edit_post:
    enabled: false
    url: ""
    static_url: false

comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10
future: true

plugins:
  - jekyll-redirect-from

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .jekyll-cache
  - .jekyll-metadata
  - .obsidian
  - .smart-env
  - "Pasted image *.png"
  - "1brc challenge.md"
  - "attention.md"
  - "DOCKER 와 PROCESS.md"
  - "ds-1-linear.md"
  - "JVM.md"
  - "liklihood.md"
  - "mle.md"
  - "RAG.md"
  - "Reactive Framework.md"
  - "RESP 프로토콜.md"
  - "rlhf.md"
  - "Spring AOP.md"
  - "Transformer.md"
  - "vae.md"
  - "VM 와 컨테이너.md"
  - "무제 1.md"
  - "무제.md"
  - "시분할 기법 cpu.md"
  - "정확도.md"
  - "코릴레이션 코.md"
  - "프로세스.md"
  - "행렬.md"
